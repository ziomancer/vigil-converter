name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Engine-liveness smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      # Two-path engine-liveness smoke test over the pinned sample skill set
      # (samples/skills): (a) ingest/parse asserting >=1 skill, and (b) convert
      # end-to-end to OpenCode (Codex fallback), asserting exit 0 + non-empty,
      # well-formed output. This is the deliverable's acceptance gate (VHS-19 D7).
      - name: Smoke test (ingest + convert to OpenCode)
        run: bun run scripts/smoke-test.ts
